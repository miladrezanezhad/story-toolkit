name: Tests

on:
  push:
    branches: [ main, develop, release/* ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
      fail-fast: false

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-dev.txt
        pip install -e .
    
    - name: Download spaCy model
      run: |
        python -m spacy download en_core_web_sm
    
    - name: Run tests with pytest
      run: |
        pytest tests/ -v --tb=short
    
    - name: Run core tests
      run: |
        python -m tests.test_core
    
    - name: Run generator tests
      run: |
        python -m tests.test_generators
    
    - name: Run LLM quick tests
      run: |
        python tests/test_llm_quick/test_quick_verify.py
        python tests/test_llm_quick/test_llm_quick.py
        python tests/test_llm_quick/test_llm_assertions.py
    
    - name: Run comprehensive tests
      run: |
        python tests/test_full_comprehensive.py
    
    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-${{ matrix.python-version }}
        path: |
          .pytest_cache/
          htmlcov/
        retention-days: 7

  test-windows:
    runs-on: windows-latest
    continue-on-error: true
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-dev.txt
        pip install -e .
    
    - name: Run tests on Windows
      run: |
        pytest tests/ -v --tb=short

  coverage:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        pip install -r requirements-dev.txt
        pip install pytest-cov
        pip install -e .
    
    - name: Run coverage
      run: |
        pytest tests/ --cov=story_toolkit --cov-report=xml --cov-report=html
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v5
      with:
        file: ./coverage.xml
        fail_ci_if_error: false
    
    - name: Upload coverage report
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: htmlcov/
        retention-days: 14

  lint:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install linting tools
      run: |
        pip install black flake8 mypy isort
    
    - name: Check formatting with black
      run: |
        black --check story_toolkit/ tests/ --line-length 100 || true
    
    - name: Lint with flake8
      run: |
        flake8 story_toolkit/ --max-line-length=100 --ignore=E203,W503 || true
    
    - name: Check imports with isort
      run: |
        isort --check-only story_toolkit/ tests/ --profile black || true
